<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown – Ritorno</title>
  <link rel="stylesheet" href="count.css" />
</head>
<body>

  <!--
    ╔══════════════════════════════════════════════╗
    ║   COUNTDOWN WIDGET — RITORNO                 ║
    ║   Data target: configurata in script.js       ║
    ║   → CONFIG.targetDate  (default: 2027-06-15) ║
    ╚══════════════════════════════════════════════╝
  -->

  <div class="cd-card" role="region" aria-label="Conto alla rovescia per il Ritorno">

    <!-- HEADER -->
    <header class="cd-header">
      <h1 class="cd-title">Ritorno</h1>
      <span class="cd-dot" aria-hidden="true"></span>
    </header>

    <!-- COUNTDOWN -->
    <div class="cd-grid" aria-live="polite" aria-atomic="true">

      <div class="cd-unit">
        <span class="cd-num" id="cd-giorni">---</span>
        <span class="cd-lbl">Giorni</span>
      </div>

      <div class="cd-unit">
        <span class="cd-num" id="cd-ore">--</span>
        <span class="cd-lbl">Ore</span>
      </div>

      <div class="cd-unit">
        <span class="cd-num" id="cd-min">--</span>
        <span class="cd-lbl">Minuti</span>
      </div>

      <div class="cd-unit">
        <span class="cd-num" id="cd-sec">--</span>
        <span class="cd-lbl">Secondi</span>
      </div>

    </div>

    <!-- FOOTER -->
    <footer class="cd-footer">

      <!-- Data target + label -->
      <div class="cd-tempo">
        <span class="cd-tempo-tag">Tempo rimanente</span>
        <span class="cd-tempo-date" id="cd-subtitle"></span>
      </div>

      <!-- Switcher fuso orario -->
      <div class="cd-tz-wrap">
        <button class="cd-tz-btn" id="cd-tz-btn" aria-haspopup="listbox" aria-label="Seleziona fuso orario">
          <span class="cd-tz-flag" id="cd-tz-flag">🇮🇹</span>
          <span class="cd-tz-name" id="cd-tz-name">Italia</span>
          <span class="cd-tz-arrow" aria-hidden="true">▲</span>
        </button>

        <!-- Dropdown -->
        <div class="cd-tz-menu" id="cd-tz-menu" role="listbox" aria-label="Fusi orari disponibili">
          <!-- opzioni generate dinamicamente da script.js (CONFIG.fusuOrari) -->
        </div>
      </div>

    </footer>

  </div><!-- /.cd-card -->

  <script src="count.js"></script>
</body>
</html>
