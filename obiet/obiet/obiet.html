<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obiettivi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="obiet.css">
</head>
<body>

  <div class="widget">
    <div class="widget-header">
      <h1 class="widget-title">Obiettivi</h1>
      <div class="widget-counter"><span id="doneCount">0</span> / 5 completati</div>
    </div>

    <div class="obiettivi-list" id="list">
      <!-- generati da main.js -->
    </div>

    <div class="widget-footer">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress"></div>
      </div>
      <div class="progress-label"><span id="pct">0</span>%</div>
      <button class="save-btn" id="saveBtn">Salva</button>
    </div>
  </div>

  <div class="toast" id="toast">Obiettivi salvati ✓</div>

  <script src="obiet.js"></script>
</body>
</html>
